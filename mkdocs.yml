site_name: Azure WAF Lab
site_description: Hands-on labs for Azure Application Gateway WAF
repo_url: https://github.com/cv-gh/azure-waf-labs

theme:
  name: material
  palette:
    primary: blue
    accent: cyan
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list

nav:
  - Home: index.md
  - Lab 1 - Deploy & Baseline: part1-deploy-baseline/index.md
  - Lab 2 - Attack & Detect: part2-attack-detect/index.md
  - Lab 3 - Prevention & Tuning: part3-prevention-tuning/index.md
  - Lab 4 - Custom Rules: part4-custom-rules/index.md
  - Lab 5 - Bot & Observability: part5-bot-observability/index.md
