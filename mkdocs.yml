site_name: Azure WAF Lab
site_description: Hands-on labs for Azure Application Gateway WAF — deploy, attack, detect, tune, and harden
site_url: https://cv-gh.github.io/azure-waf-labs/
repo_url: https://github.com/cv-gh/azure-waf-labs
repo_name: cv-gh/azure-waf-labs
edit_uri: edit/master/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/shield.svg
  favicon: assets/shield.svg
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - announce.dismiss
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cv-gh/azure-waf-labs
  analytics:
    feedback:
      title: Was this lab helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Yes
          data: 1
          note: Thanks for the feedback!
        - icon: material/emoticon-sad-outline
          name: No
          data: 0
          note: Thanks for the feedback!

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Labs:
    - Lab 1 — Deploy & Baseline: part1-deploy-baseline/index.md
    - Lab 2 — Attack & Detect: part2-attack-detect/index.md
    - Lab 3 — Prevention & Tuning: part3-prevention-tuning/index.md
    - Lab 4 — Custom Rules: part4-custom-rules/index.md
    - Lab 5 — Bot & Observability: part5-bot-observability/index.md
